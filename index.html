<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARM.OS — Site Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050b14;
    --cyan: #35e6ff;
    --cyan-dim: #1b7f96;
    --ink: #d8f4ff;
    --muted: #6f93a8;
    --border: rgba(53, 230, 255, 0.15);
    --green: #48ffb0;
    --amber: #ffcb47;
    --blue: #4da8ff;
    --grey: #7d95a3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    padding: 32px 20px 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .stats {
    display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .stat .num { font-size: 1.3rem; font-weight: 700; color: var(--cyan); }
  .stat .label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
  .filter-btn {
    border: 1px solid var(--border); background: transparent; color: var(--cyan-dim);
    padding: 5px 12px; font-size: 0.72rem; cursor: pointer;
    font-family: 'Share Tech Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase;
    border-radius: 3px;
  }
  .filter-btn:hover { color: var(--cyan); border-color: var(--cyan); }
  .filter-btn.active { background: rgba(53,230,255,0.12); color: var(--cyan); border-color: var(--cyan); }
  .row {
    display: flex; align-items: baseline; flex-wrap: wrap;
    gap: 4px 10px; padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .row-name { font-weight: 700; font-size: 0.9rem; color: var(--ink); }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    display: inline-block; margin-right: 2px;
  }
  .dot.replied { background: var(--green); }
  .dot.emailed { background: var(--amber); }
  .dot.deployed { background: var(--blue); }
  .dot.pending { background: var(--grey); }
  .status-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .row-links { display: flex; gap: 12px; margin-left: auto; font-size: 0.78rem; }
  .row-links a { color: var(--cyan-dim); text-decoration: none; }
  .row-links a:hover { color: var(--cyan); text-decoration: underline; }
  .row-note { width: 100%; font-size: 0.76rem; color: var(--muted); margin-top: 2px; }
  footer { text-align: center; color: var(--muted); font-size: 0.7rem; margin-top: 40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
  <footer>Personal tracker — sanitized public view</footer>
</div>

<script>
const sites = [
  { name: "Vaskivuorentila", gh: "antonjalonen-cmd.github.io/vaskivuoren-tila", nf: "vaskivuoren-tila.netlify.app", status: "replied", note: "Warm lead — pricing discussion in progress, waiting on their reply." },
  { name: "Rossihaan Lammastila", gh: "antonjalonen-cmd.github.io/rossihaan-lammastila", nf: "rossihaan-lammastila.netlify.app", status: "emailed", note: "Outreach sent, no reply yet." },
  { name: "Lehtosen Marja- ja Vihannestila", gh: "antonjalonen-cmd.github.io/lehtosen-marja-vihannestila", nf: "lehtosen-marja-vihannestila.netlify.app", status: "emailed", note: "Outreach sent, no reply yet." },
  { name: "Paivarinteen Maatila", gh: "antonjalonen-cmd.github.io/paivarinne-maatila", nf: "paivarinteen-maatila.netlify.app", status: "emailed", note: "Outreach sent, no reply yet." },
  { name: "Stromsbergin Mylly Oy", gh: "antonjalonen-cmd.github.io/stromsbergin-mylly", nf: "stromsbergin-mylly.netlify.app", status: "emailed", note: "Outreach sent, no reply yet." },
  { name: "Karhulan Tila", gh: null, nf: "karhulan-tila.netlify.app", status: "emailed", note: "Done in an earlier session." },
  { name: "Kukkaromäen Maatila", gh: null, nf: "kukkaromaenmaatila.netlify.app", status: "emailed", note: "Done in an earlier session." },
  { name: "Latva-Mantilan hunajatila", gh: "antonjalonen-cmd.github.io/latva-mantilan-hunajatila", nf: null, status: "deployed", note: "No contact found yet." },
  { name: "FinneFarm", gh: "antonjalonen-cmd.github.io/finnefarm", nf: null, status: "deployed", note: "Outreach not sent yet." },
  { name: "Karjalaisten Tila", gh: "antonjalonen-cmd.github.io/karjalaisten-tila", nf: null, status: "deployed", note: "Outreach not sent yet." },
  { name: "Koivuniemen Puutarha", gh: "antonjalonen-cmd.github.io/koivuniemen-puutarha", nf: null, status: "deployed", note: "No contact found yet." },
  { name: "Leponiemen Maatila", gh: "antonjalonen-cmd.github.io/leponiemen-maatila", nf: null, status: "deployed", note: "No contact found yet." },
  { name: "Puustijarven Marjatila", gh: "antonjalonen-cmd.github.io/puustijarven-marjatila", nf: null, status: "deployed", note: "Outreach not sent yet." },
  { name: "Selinin Marjatila", gh: "antonjalonen-cmd.github.io/selinin-marjatila", nf: null, status: "deployed", note: "No contact found yet." },
  { name: "Tiia-Marin Kukkamaa", gh: "antonjalonen-cmd.github.io/tiia-marin-kukkamaa", nf: null, status: "deployed", note: "Outreach not sent yet." },
  { name: "Vähätalon tila", gh: "antonjalonen-cmd.github.io/vahatalon-tila", nf: null, status: "deployed", note: "Built 2026-07-05, no outreach yet." },
  { name: "Kangasniemen Tila", gh: "antonjalonen-cmd.github.io/kangasniemen-tila", nf: null, status: "deployed", note: "Built 2026-07-05, no outreach yet." },
  { name: "Kaskitaival Oy", gh: "antonjalonen-cmd.github.io/kaskitaival-oy", nf: null, status: "deployed", note: "Built 2026-07-05, no outreach yet." },
  { name: "Ojalan tila", gh: "antonjalonen-cmd.github.io/ojalan-tila", nf: null, status: "deployed", note: "Built 2026-07-05, no outreach yet." },
  { name: "Metsälän tila", gh: "antonjalonen-cmd.github.io/metsalan-tila", nf: null, status: "deployed", note: "Built 2026-07-05, no outreach yet." },
];

const statusMeta = {
  replied:  { label: "Replied" },
  emailed:  { label: "Emailed" },
  deployed: { label: "Deployed" },
  pending:  { label: "Not deployed" },
};

function render(filter) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  const list = filter === 'all' ? sites : sites.filter(s => s.status === filter);
  list.forEach(s => {
    const sm = statusMeta[s.status];
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <span class="dot ${s.status}"></span>
      <span class="row-name">${s.name}</span>
      <span class="status-label">${sm.label}</span>
      <span class="row-links">
        ${s.gh ? `<a href="https://${s.gh}/" target="_blank">${s.gh}</a>` : ''}
        ${s.nf ? `<a href="https://${s.nf}/" target="_blank">${s.nf}</a>` : ''}
      </span>
      ${s.note ? `<span class="row-note">${s.note}</span>` : ''}
    `;
    listEl.appendChild(row);
  });
}

function renderStats() {
  const counts = { all: sites.length, replied: 0, emailed: 0, deployed: 0, pending: 0 };
  sites.forEach(s => counts[s.status]++);
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat"><span class="num">${counts.all}</span> <span class="label">total</span></div>
    <div class="stat"><span class="num">${counts.replied}</span> <span class="label">replied</span></div>
    <div class="stat"><span class="num">${counts.emailed}</span> <span class="label">emailed</span></div>
    <div class="stat"><span class="num">${counts.deployed}</span> <span class="label">deployed, no email</span></div>
  `;
}

function renderFilters() {
  const filtersEl = document.getElementById('filters');
  const opts = [['all','All'],['replied','Replied'],['emailed','Emailed'],['deployed','Deployed']];
  filtersEl.innerHTML = opts.map(([key,label], i) =>
    `<button class="filter-btn${i===0?' active':''}" data-filter="${key}">${label}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.filter);
    });
  });
}

renderStats();
renderFilters();
render('all');
</script>
</body>
</html>
