<title>FARM.OS — Site Intelligence Dashboard</title>

<style>
  :root {
    --bg: #050b14;
    --cyan: #35e6ff;
    --cyan-dim: #1b7f96;
    --ink: #d8f4ff;
    --muted: #6f93a8;
    --border: rgba(53, 230, 255, 0.15);
    --green: #48ffb0;
    --amber: #ffcb47;
    --blue: #4da8ff;
    --grey: #7d95a3;
    --red: #ff5f6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    padding: 32px 20px 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .stats {
    display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .stat .num { font-size: 1.3rem; font-weight: 700; color: var(--cyan); }
  .stat .label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
  .filter-btn {
    border: 1px solid var(--border); background: transparent; color: var(--cyan-dim);
    padding: 5px 12px; font-size: 0.72rem; cursor: pointer;
    font-family: 'Share Tech Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase;
    border-radius: 3px;
  }
  .filter-btn:hover { color: var(--cyan); border-color: var(--cyan); }
  .filter-btn.active { background: rgba(53,230,255,0.12); color: var(--cyan); border-color: var(--cyan); }
  .date-group { margin-top: 18px; }
  .date-group:first-of-type { margin-top: 0; }
  .date-header {
    font-size: 0.78rem; font-weight: 700; color: var(--cyan);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 0 8px 18px; margin: 0;
    border-bottom: 1px solid var(--cyan-dim);
    cursor: pointer; list-style: none; position: relative;
    user-select: none;
  }
  .date-header::-webkit-details-marker { display: none; }
  .date-header::before {
    content: '▸'; position: absolute; left: 0; color: var(--cyan);
    transition: transform 0.15s ease;
  }
  .date-group[open] > .date-header::before { transform: rotate(90deg); }
  .date-header .count { color: var(--muted); font-weight: 400; margin-left: 8px; text-transform: none; letter-spacing: 0; }
  .row {
    display: flex; align-items: baseline; flex-wrap: wrap;
    gap: 4px 10px; padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .time-label { font-size: 0.72rem; color: var(--muted); min-width: 38px; }
  .row-name { font-weight: 700; font-size: 0.9rem; color: var(--ink); text-decoration: none; }
  a.row-name:hover { color: var(--cyan); text-decoration: underline; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    display: inline-block; margin-right: 2px;
  }
  .dot.replied { background: var(--green); }
  .dot.emailed { background: var(--amber); }
  .dot.drafted { background: var(--cyan); }
  .dot.deployed { background: var(--blue); }
  .dot.pending { background: var(--grey); }
  .dot.bounced { background: var(--red); }
  .status-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .row-links { display: flex; gap: 12px; margin-left: auto; font-size: 0.78rem; }
  .row-links a { color: var(--cyan-dim); text-decoration: none; }
  .row-links a:hover { color: var(--cyan); text-decoration: underline; }
  .row-note { width: 100%; font-size: 0.76rem; color: var(--muted); margin-top: 2px; }
  footer { text-align: center; color: var(--muted); font-size: 0.7rem; margin-top: 40px; }
</style>
</head>

const statusMeta = {
  replied:  { label: "Replied" },
  emailed:  { label: "Emailed" },
  bounced:  { label: "Bounced" },
  drafted:  { label: "Drafted" },
  deployed: { label: "Deployed" },
  pending:  { label: "Not deployed" },
};

function render(filter) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  const list = filter === 'all' ? sites : sites.filter(s => s.status === filter);

  // group by date
  const groups = {};
  list.forEach(s => { (groups[s.date] = groups[s.date] || []).push(s); });

  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a)); // newest date first

  dates.forEach((date, i) => {
    const entries = groups[date].slice().sort((a, b) => {
      if (a.time && b.time) return b.time.localeCompare(a.time); // newest time first
      if (a.time && !b.time) return -1;
      if (!a.time && b.time) return 1;
      return 0;
    });

    const details = document.createElement('details');
    details.className = 'date-group';
    if (i === 0) details.open = true; // only the newest date open by default

    const summary = document.createElement('summary');
    summary.className = 'date-header';
    const d = new Date(date + 'T00:00:00');
    const label = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    summary.innerHTML = `${label}<span class="count">${entries.length} site${entries.length === 1 ? '' : 's'}</span>`;
    details.appendChild(summary);

    entries.forEach(s => {
      const sm = statusMeta[s.status];
      function normUrl(raw) {
        if (!raw) return null;
        const url = raw.startsWith('http') ? raw : `https://${raw}`;
        return url.endsWith('/') ? url : url + '/';
      }
      const primaryUrl = normUrl(s.gh) || normUrl(s.nf);
      const nameHtml = primaryUrl
        ? `<a class="row-name" href="${primaryUrl}" target="_blank">${s.name}</a>`
        : `<span class="row-name">${s.name}</span>`;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <span class="time-label">${s.time || '—'}</span>
        <span class="dot ${s.status}"></span>
        ${nameHtml}
        <span class="status-label">${sm.label}</span>
        <span class="row-links">
          ${s.gh ? `<a href="${normUrl(s.gh)}" target="_blank">${normUrl(s.gh)}</a>` : ''}
          ${s.nf ? `<a href="${normUrl(s.nf)}" target="_blank">${normUrl(s.nf)}</a>` : ''}
        </span>
      `;
      details.appendChild(row);
    });

    listEl.appendChild(details);
  });
}

function renderStats() {
  const counts = { all: sites.length, replied: 0, emailed: 0, bounced: 0, drafted: 0, deployed: 0, pending: 0 };
  sites.forEach(s => counts[s.status]++);
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat"><span class="num">${counts.all}</span> <span class="label">total</span></div>
    <div class="stat"><span class="num">${counts.replied}</span> <span class="label">replied</span></div>
    <div class="stat"><span class="num">${counts.emailed}</span> <span class="label">emailed</span></div>
    <div class="stat"><span class="num">${counts.bounced}</span> <span class="label">bounced</span></div>
    <div class="stat"><span class="num">${counts.drafted}</span> <span class="label">drafted, not sent</span></div>
    <div class="stat"><span class="num">${counts.deployed}</span> <span class="label">deployed, no email</span></div>
  `;
}

function renderFilters() {
  const filtersEl = document.getElementById('filters');
  const opts = [['all','All'],['replied','Replied'],['emailed','Emailed'],['bounced','Bounced'],['deployed','Deployed']];
  filtersEl.innerHTML = opts.map(([key,label], i) =>
    `<button class="filter-btn${i===0?' active':''}" data-filter="${key}">${label}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.filter);
    });
  });
}

renderStats();
renderFilters();
render('all');
